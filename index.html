<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Game Night</title>
  <link rel="icon" href="Images/Icon.png" type="image/png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
    @font-face {
      font-family: 'Game Over';
      src: url('Fonts/Game Over.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Satisfy';
      src: url('Fonts/Satisfy.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Twitch';
      src: url('Fonts/Twitch.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
  
    html, body {
      background: #0a0a0a !important;
      color: #fff;
      font-family: 'Montserrat', Arial, sans-serif;
      min-height: 100vh;
      height: 100%;
      margin: 0;
      box-sizing: border-box;
    }
    body, html, #root, .center-wrapper {
      background-color: #0a0a0a !important;
    }
    * {
      box-sizing: inherit;
    }
    .center-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    h1 {
      text-align: center;
      margin-bottom: 1.2rem;
      color: #f3ec40;
      text-transform: uppercase;
      font-size: 12rem;
      font-family: 'Game Over', sans-serif;
      letter-spacing: 0.1em;
      margin-block-start: 1.2rem;
      text-shadow: 
        -2px -2px 0 #1e3a8a,
        2px -2px 0 #1e3a8a,
        -2px 2px 0 #1e3a8a,
        2px 2px 0 #1e3a8a,
        -2px 0 0 #1e3a8a,
        2px 0 0 #1e3a8a,
        0 -2px 0 #1e3a8a,
        0 2px 0 #1e3a8a;
    }
    .sub-heading {
      text-align: center;
      font-family: 'Satisfy', cursive;
      font-size: 2.5rem;
      color: #fff;
      margin-bottom: 2.5rem;
      text-shadow:
        0 0 8px #ff2a2a,
        0 0 16px #ff2a2a,
        0 0 2px #fff;
      letter-spacing: 0.04em;
    }
    .nav {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      width: 100%;
      max-width: 400px;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 1.2rem;
    }
    .nav-link {
      display: block;
      width: 100%;
      padding: 1.2rem 0;
      font-size: 1.5rem;
      font-family: 'Segoe UI', sans-serif;
      font-weight: 700;
      text-align: center;
      border-radius: 12px;
      background: #152a5a;
      color: #fff;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      border: 2px solid #2563eb;
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
span.nav-link.disabled,
a.nav-link.disabled {
  background: #333 !important;
  border: 2px solid #555 !important;
  color: #aaa !important;
  box-shadow: none !important;
  cursor: not-allowed !important;
  pointer-events: none !important;
  opacity: 0.7;
}
span.nav-link.disabled:hover, span.nav-link.disabled:focus,
a.nav-link.disabled:hover, a.nav-link.disabled:focus {
  background: #444 !important;
  color: #aaa !important;
  border: 2px solid #666 !important;
  box-shadow: none !important;
  transform: none !important;
  border-radius: 12px !important;
}
.nav-link.twitch-live {
  /* Move disabled styles below all other nav-link styles for maximum specificity */
  span.nav-link.disabled,
  a.nav-link.disabled {
    background: #333 !important;
    border: 2px solid #555 !important;
    color: #aaa !important;
    box-shadow: none !important;
    cursor: not-allowed !important;
    pointer-events: none !important;
    opacity: 0.7;
  }
  span.nav-link.disabled:hover, span.nav-link.disabled:focus,
  a.nav-link.disabled:hover, a.nav-link.disabled:focus {
    background: #444 !important;
    color: #aaa !important;
    border: 2px solid #666 !important;
    box-shadow: none !important;
    transform: none !important;
    border-radius: 12px !important;
  }
  background: #772ce8 !important;
  border-color: #9147ff !important;
  color: #fff !important;
  box-shadow: 0 0 18px #9147ff88, 0 4px 16px #772ce8;
  transition: all 0.15s ease;
}
.nav-link.twitch-live:hover, .nav-link.twitch-live:focus {
  background: #9147ff !important;
  border-color: #f3ec40 !important;
  color: #fff !important;
  box-shadow: 0 0 25px #f3ec40, 0 0 18px #9147ff88, 0 4px 16px #772ce8;
  transform: scale(1.05);
  border-radius: 16px;
}
.nav-link:hover, .nav-link:focus {
      box-shadow: 0 0 25px rgba(243, 236, 64, 1);
      transform: scale(1.05);
      border-color: #f3ec40;
      border-radius: 16px;
      background: #0b3797;
      color: #fff;
    }
    .nav-link span {
      position: relative;
      z-index: 1;
    }
    .twitch-label {
      font-family: 'Twitch', Arial, sans-serif !important;
      color: #f3f3f3 !important;
      font-size: 0.65em;
      letter-spacing: 0.04em;
      vertical-align: middle;
      position: relative;
      top: -0.7em;
      text-shadow:
        0 12px 24px #9147ff, /* longest, solid purple shadow at bottom */
        0 8px 0 #9147ff,     /* solid bottom edge */
        0 4px 0 #9147ff,     /* solid bottom edge */
        0 -2px 0 #9147ff,    /* outline top */
        -2px 0 0 #9147ff,    /* outline left */
        2px 0 0 #9147ff,     /* outline right */
        0 0 2px #fff;        /* subtle white glow */
    }
    @media (max-width: 600px) {
      h1 {
        font-size: 4.5rem;
        margin-block-start: 1.2rem;
      }
      .sub-heading {
        font-size: 1.2rem;
      }
      .nav-link {
        font-size: 1rem;
        padding: 0.8rem 0.2rem;
        width: 80vw;
        max-width: 220px;
        min-width: 0;
        box-sizing: border-box;
        margin-left: auto;
        margin-right: auto;
      }
      .nav {
        max-width: 400px;
        width: 100%;
        padding: 0;
        margin-left: auto;
        margin-right: auto;
        margin-bottom: 1.2rem;
      }
      .center-wrapper {
        max-width: 100vw;
        padding: 0;
        box-sizing: border-box;
        margin: 0 auto;
          /* Add bottom buffer so the bottom nav button isn't flush to the screen edge
            on mobile devices and respects the device safe-area inset. */
          padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 85px);
      }
    }
  </style>
</head>
<body>
  <div class="center-wrapper">
    <h1>GAME NIGHT</h1>
    <div class="sub-heading">by Persephone's Chair</div>
    <nav class="nav">
      <a id="twitch-live-btn" class="nav-link twitch-live" href="https://twitch.tv/royal_flush" target="_blank" rel="noopener" aria-disabled="false" tabindex="0"><span>Watch Live</span></a>
      <a class="nav-link" href="OnDemand/index.html"><span>Watch on Demand</span></a>
      <a class="nav-link" href="UniCon/index.html"><span>The Universal Controller</span></a>
      <a class="nav-link" href="PennyBank/index.html"><span>The Penny Bank</span></a>
      <a class="nav-link" href="https://discord.gg/persephoneschair" target="_blank" rel="noopener"><span>Join the Discord</span></a>
      <a class="nav-link" href="Downloads/index.html"><span>Downloads</span></a>
    </nav>
  </div>
</body>
</html>
<script>
  // Scheduling logic removed: make the Twitch button always active.
  (function() {
    const btn = document.getElementById('twitch-live-btn');
    if (!btn) return;
    // If it's already an anchor with correct attrs, nothing to do.
    if (btn.tagName.toLowerCase() === 'a') {
      btn.classList.remove('disabled');
      btn.classList.add('twitch-live');
      btn.href = 'https://twitch.tv/royal_flush';
      btn.target = '_blank';
      btn.rel = 'noopener';
      btn.setAttribute('aria-disabled', 'false');
      btn.setAttribute('tabindex', '0');
      const span = btn.querySelector('span');
      if (span) span.textContent = 'Watch Live';
      return;
    }
    // Replace non-anchor with anchor
    const a = document.createElement('a');
    a.id = 'twitch-live-btn';
    a.className = 'nav-link twitch-live';
    a.href = 'https://twitch.tv/royal_flush';
    a.target = '_blank';
    a.rel = 'noopener';
    a.setAttribute('aria-disabled', 'false');
    a.setAttribute('tabindex', '0');
    a.innerHTML = '<span>Watch Live</span>';
    btn.parentNode.replaceChild(a, btn);
  })();
</script>
